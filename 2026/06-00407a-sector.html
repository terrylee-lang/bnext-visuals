<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>00407A 模擬產業配置 ｜ 數位時代</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Inter:wght@400;500;600;700&display=swap">
<style>
  :root {
    --bn-orange: #FF6B1A;
    --bn-navy: #0F1A2E;
    --bn-black: #1A1A1A;
    --paper: #FAF7F1;
    --paper2: #F5F3EF;
    --paper3: #ECE8DF;
    --warm300: #D4D0C8;
    --cool600: #5C6470;
    --cool400: #8A93A0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--paper);
    color: var(--bn-black);
    font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", -apple-system, sans-serif;
    line-height: 1.8;
    padding: 24px 16px;
    text-wrap: pretty;
  }
  .wrapper {
    max-width: 880px;
    margin: 0 auto;
    container-type: inline-size;
    transition: max-width 0.25s ease;
  }

  /* Header */
  header { margin-bottom: 24px; }
  .kicker {
    font-family: "Inter", "Noto Sans TC", sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--bn-orange);
    font-weight: 700;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  h1 {
    font-size: 22px;
    line-height: 1.3;
    font-weight: 900;
    margin-bottom: 8px;
    letter-spacing: 0.02em;
    text-wrap: balance;
  }
  .deck {
    font-size: 14px;
    color: var(--cool600);
    line-height: 1.65;
    text-wrap: balance;
  }

  /* Bar chart */
  .bars { margin: 20px 0 24px; }
  .bar-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }
  .bar-label {
    flex: 0 0 148px;
    font-size: 14px;
    font-weight: 500;
    text-align: right;
    color: var(--bn-black);
    line-height: 1.4;
  }
  .bar-track {
    flex: 1;
    height: 38px;
    background: var(--paper3);
    border-radius: 4px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    background: var(--bn-orange);
    border-radius: 4px;
  }
  .bar-fill.gray {
    background: var(--cool400);
  }
  .bar-pct {
    flex: 0 0 52px;
    font-family: "Inter", "Noto Sans TC", sans-serif;
    font-feature-settings: 'tnum' 1;
    font-size: 14px;
    font-weight: 700;
    color: var(--bn-black);
  }

  /* Approx tag */
  .approx {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    color: var(--cool600);
    background: var(--paper3);
    padding: 1px 5px;
    border-radius: 3px;
    margin-left: 4px;
    vertical-align: middle;
    letter-spacing: 0.02em;
  }

  /* Divider before 其他產業 */
  .bar-row.separator {
    padding-top: 10px;
    border-top: 1px dashed var(--warm300);
    margin-top: 4px;
  }

  /* Footnote */
  .footnote {
    border-top: 1px solid var(--warm300);
    padding-top: 10px;
    font-size: 12px;
    color: var(--cool600);
    line-height: 1.6;
  }

  /* Mobile */
  @container (max-width: 520px) {
    h1 { font-size: 18px; }
    .bar-label {
      flex: 0 0 88px;
      font-size: 12px;
    }
    .bar-pct { font-size: 12px; flex: 0 0 44px; }
    .bar-track { height: 32px; }
    .approx { display: none; }
  }
  @media (max-width: 520px) {
    body { padding: 16px 12px; }
  }

  /* Preview toolbar */
  .preview-toolbar {
    display: none;
    position: fixed;
    top: 14px;
    right: 14px;
    z-index: 9999;
    background: var(--bn-navy);
    padding: 4px;
    border-radius: 6px;
    gap: 2px;
    font-family: "Inter", "Noto Sans TC", sans-serif;
    box-shadow: 0 2px 8px rgba(0,0,0,0.18);
  }
  .preview-toolbar.show { display: flex; align-items: center; }
  .preview-toolbar .label {
    font-size: 10px;
    color: rgba(250,247,241,0.45);
    padding: 0 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .preview-toolbar button {
    border: 0;
    padding: 7px 13px;
    font-size: 12px;
    font-weight: 700;
    background: transparent;
    color: rgba(250,247,241,0.55);
    cursor: pointer;
    border-radius: 4px;
    font-family: inherit;
  }
  .preview-toolbar button.active {
    background: var(--bn-orange);
    color: var(--paper);
  }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="kicker">成分股分布 · 模擬配置</div>
    <h1>00407A 模擬產業配置</h1>
    <p class="deck">以電子半導體、電子零組件為核心，四大電子類別在股票部位中合計約 80%</p>
  </header>

  <div class="bars">

    <div class="bar-row">
      <div class="bar-label">電子半導體</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:100%"></div>
      </div>
      <div class="bar-pct">33.1%</div>
    </div>

    <div class="bar-row">
      <div class="bar-label">電子零組件</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:76.4%"></div>
      </div>
      <div class="bar-pct">25.3%</div>
    </div>

    <div class="bar-row">
      <div class="bar-label">電腦及周邊設備</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:35.3%"></div>
      </div>
      <div class="bar-pct">11.7%</div>
    </div>

    <div class="bar-row">
      <div class="bar-label">其他電子</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:29.0%"></div>
      </div>
      <div class="bar-pct">9.6%</div>
    </div>

    <div class="bar-row separator">
      <div class="bar-label">其他產業<span class="approx">估算</span></div>
      <div class="bar-track">
        <div class="bar-fill gray" style="width:60.4%"></div>
      </div>
      <div class="bar-pct" style="color:var(--cool600);">約 20%</div>
    </div>

  </div>

  <div class="footnote">
    以上為股票部位內的相對權重，非基金總資產配置比例。「其他產業」為估算值，四大電子類別實際合計 79.7%。資料來源：凱基投信掛牌前公布之模擬配置，實際持股以官方定期公告為準。
  </div>

</div>

<div class="preview-toolbar" id="previewToolbar" role="toolbar" aria-label="預覽模式切換">
  <span class="label">預覽</span>
  <button type="button" class="active" data-mode="desktop" aria-pressed="true">桌機</button>
  <button type="button" data-mode="mobile" aria-pressed="false">手機</button>
</div>

<script>
(function() {
  if (!new URLSearchParams(location.search).has('preview')) return;
  var toolbar = document.getElementById('previewToolbar');
  var wrapper = document.querySelector('.wrapper');
  if (!toolbar || !wrapper) return;
  toolbar.classList.add('show');
  toolbar.addEventListener('click', function(e) {
    var btn = e.target.closest('button[data-mode]');
    if (!btn) return;
    toolbar.querySelectorAll('button').forEach(function(b) {
      b.classList.toggle('active', b === btn);
      b.setAttribute('aria-pressed', b === btn ? 'true' : 'false');
    });
    wrapper.style.maxWidth = btn.dataset.mode === 'mobile' ? '390px' : '880px';
  });
})();
</script>
</body>
</html>
