<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>00407A vs 009816 年費率比較 ｜ 數位時代</title>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Inter:wght@400;500;600;700&display=swap">
<style>
  :root {
    --bn-orange: #FF6B1A;
    --bn-navy: #0F1A2E;
    --bn-black: #1A1A1A;
    --paper: #FAF7F1;
    --paper2: #F5F3EF;
    --paper3: #ECE8DF;
    --warm300: #D4D0C8;
    --cool600: #5C6470;
    --cool400: #8A93A0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    background: var(--paper);
    color: var(--bn-black);
    font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", -apple-system, sans-serif;
    line-height: 1.8;
    padding: 24px 16px;
    text-wrap: pretty;
  }
  .wrapper {
    max-width: 880px;
    margin: 0 auto;
    container-type: inline-size;
    transition: max-width 0.25s ease;
  }

  /* Header */
  header { margin-bottom: 24px; }
  .kicker {
    font-family: "Inter", "Noto Sans TC", sans-serif;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--bn-orange);
    font-weight: 700;
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  h1 {
    font-size: 22px;
    line-height: 1.3;
    font-weight: 900;
    margin-bottom: 8px;
    letter-spacing: 0.02em;
    text-wrap: balance;
  }
  .deck {
    font-size: 14px;
    color: var(--cool600);
    line-height: 1.65;
    text-wrap: balance;
  }

  /* Key stat */
  .stat-strip {
    display: flex;
    align-items: center;
    gap: 20px;
    background: var(--paper3);
    border-radius: 8px;
    padding: 16px 20px;
    margin: 20px 0 24px;
    border-left: 4px solid var(--bn-orange);
  }
  .stat-num {
    font-family: "Inter", "Noto Sans TC", sans-serif;
    font-feature-settings: 'tnum' 1;
    font-size: 40px;
    font-weight: 900;
    color: var(--bn-orange);
    line-height: 1;
    white-space: nowrap;
  }
  .stat-desc {
    font-size: 14px;
    color: var(--bn-black);
    line-height: 1.6;
  }
  .stat-desc strong { font-weight: 700; }

  /* Bar chart */
  .bars { margin-bottom: 24px; }
  .bar-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .bar-row:last-child { margin-bottom: 0; }

  .bar-meta {
    flex: 0 0 148px;
    text-align: right;
  }
  .bar-code {
    font-size: 16px;
    font-weight: 700;
    color: var(--bn-black);
    line-height: 1.3;
    font-family: "Inter", "Noto Sans TC", sans-serif;
    display: block;
  }
  .bar-row.highlight .bar-code { color: var(--bn-orange); }
  .bar-type {
    font-size: 12px;
    color: var(--cool600);
    display: block;
    line-height: 1.3;
  }

  .bar-track {
    flex: 1;
    height: 44px;
    background: var(--paper3);
    border-radius: 4px;
    overflow: hidden;
  }
  .bar-fill {
    height: 100%;
    background: var(--cool400);
    border-radius: 4px;
  }
  .bar-row.highlight .bar-fill {
    background: var(--bn-orange);
  }

  .bar-pct {
    flex: 0 0 56px;
    font-family: "Inter", "Noto Sans TC", sans-serif;
    font-feature-settings: 'tnum' 1;
    font-size: 15px;
    font-weight: 700;
    color: var(--bn-black);
  }
  .bar-row.highlight .bar-pct { color: var(--bn-orange); }

  /* Footnote */
  .footnote {
    border-top: 1px solid var(--warm300);
    padding-top: 10px;
    font-size: 12px;
    color: var(--cool600);
    line-height: 1.6;
  }

  /* Mobile */
  @container (max-width: 520px) {
    h1 { font-size: 18px; }
    .bar-meta {
      flex: 0 0 80px;
    }
    .bar-code { font-size: 14px; }
    .bar-type { display: none; }
    .bar-pct { font-size: 13px; flex: 0 0 46px; }
    .bar-track { height: 38px; }
    .stat-num { font-size: 32px; }
    .stat-desc { font-size: 13px; }
    .stat-strip { gap: 14px; padding: 14px 16px; }
  }
  @media (max-width: 520px) {
    body { padding: 16px 12px; }
  }

  /* Preview toolbar */
  .preview-toolbar {
    display: none;
    position: fixed;
    top: 14px;
    right: 14px;
    z-index: 9999;
    background: var(--bn-navy);
    padding: 4px;
    border-radius: 6px;
    gap: 2px;
    font-family: "Inter", "Noto Sans TC", sans-serif;
    box-shadow: 0 2px 8px rgba(0,0,0,0.18);
  }
  .preview-toolbar.show { display: flex; align-items: center; }
  .preview-toolbar .label {
    font-size: 10px;
    color: rgba(250,247,241,0.45);
    padding: 0 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .preview-toolbar button {
    border: 0;
    padding: 7px 13px;
    font-size: 12px;
    font-weight: 700;
    background: transparent;
    color: rgba(250,247,241,0.55);
    cursor: pointer;
    border-radius: 4px;
    font-family: inherit;
  }
  .preview-toolbar button.active {
    background: var(--bn-orange);
    color: var(--paper);
  }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="kicker">費用率 · 主動 vs 被動</div>
    <h1>00407A vs 009816 年費率比較</h1>
    <p class="deck">主動選股的費率代價：00407A 經理費較被動型 009816 高逾 10 倍，長期持有需納入複利侵蝕考量</p>
  </header>

  <div class="stat-strip">
    <div class="stat-num">10.7×</div>
    <div class="stat-desc"><strong>00407A 經理費是 009816 的 10.7 倍</strong><br>100 萬元持有一年，費率差距約 6,800 元</div>
  </div>

  <div class="bars">

    <div class="bar-row highlight">
      <div class="bar-meta">
        <span class="bar-code">00407A</span>
        <span class="bar-type">主動式 · 不配息</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill" style="width:100%"></div>
      </div>
      <div class="bar-pct">0.75%</div>
    </div>

    <div class="bar-row">
      <div class="bar-meta">
        <span class="bar-code">009816</span>
        <span class="bar-type">被動式 · 不配息</span>
      </div>
      <div class="bar-track">
        <div class="bar-fill" style="width:9.3%"></div>
      </div>
      <div class="bar-pct">0.07%</div>
    </div>

  </div>

  <div class="footnote">
    比較項目為各基金公開說明書揭露之經理費（年），不含保管費及其他行政費用。009816 全名為凱基台灣 TOP 50 ETF 基金，同出自凱基投信，同為不配息設計。資料來源：各基金公開說明書。
  </div>

</div>

<div class="preview-toolbar" id="previewToolbar" role="toolbar" aria-label="預覽模式切換">
  <span class="label">預覽</span>
  <button type="button" class="active" data-mode="desktop" aria-pressed="true">桌機</button>
  <button type="button" data-mode="mobile" aria-pressed="false">手機</button>
</div>

<script>
(function() {
  if (!new URLSearchParams(location.search).has('preview')) return;
  var toolbar = document.getElementById('previewToolbar');
  var wrapper = document.querySelector('.wrapper');
  if (!toolbar || !wrapper) return;
  toolbar.classList.add('show');
  toolbar.addEventListener('click', function(e) {
    var btn = e.target.closest('button[data-mode]');
    if (!btn) return;
    toolbar.querySelectorAll('button').forEach(function(b) {
      b.classList.toggle('active', b === btn);
      b.setAttribute('aria-pressed', b === btn ? 'true' : 'false');
    });
    wrapper.style.maxWidth = btn.dataset.mode === 'mobile' ? '390px' : '880px';
  });
})();
</script>
</body>
</html>
