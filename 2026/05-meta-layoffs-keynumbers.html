<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meta 裁員數字 ｜ 數位時代</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap">
<style>
  /* BN Design System v0.2 tokens */
  :root {
    --bn-orange:      #FF6B1A;
    --bn-orange-deep: #E55A0F;
    --bn-navy:        #0F1A2E;
    --bn-black:       #1A1A1A;
    --paper:          #FAF7F1;
    --paper-2:        #F5F3EF;
    --paper-3:        #ECE8DF;
    --cool-600:       #5C6470;
    --hairline:       rgba(15,26,46,.12);
    --font-tc:        "Noto Sans TC", "PingFang TC", -apple-system, sans-serif;
    --font-en:        "Inter", "Noto Sans TC", sans-serif;
    --font-mono:      "JetBrains Mono", ui-monospace, monospace;
    --r-card:         8px;
    --r-feature:      24px;
    --ease-standard:  cubic-bezier(.2,.7,.2,1);
    --dur-base:       200ms;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--paper);
    color: var(--bn-black);
    font-family: var(--font-en);
    -webkit-font-smoothing: antialiased;
  }

  .widget {
    max-width: 880px;
    margin: 0 auto;
    padding: 40px 32px 0;
  }

  /* ── Header ── */
  .widget-header {
    margin-bottom: 28px;
  }

  .widget-kicker {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--cool-600);
    margin-bottom: 8px;
  }

  .widget-title {
    font-family: var(--font-tc);
    font-size: 22px;
    font-weight: 700;
    line-height: 1.35;
    color: var(--bn-black);
    letter-spacing: 0.01em;
  }

  .widget-title span {
    text-decoration: underline;
    text-decoration-thickness: 3px;
    text-underline-offset: 5px;
    text-decoration-color: var(--bn-orange);
  }

  /* ── Cards grid ── */
  .cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 0;
  }

  .card {
    background: var(--paper-2);
    border-radius: var(--r-card);
    padding: 28px 24px 24px;
    position: relative;
    overflow: hidden;
    transition: background var(--dur-base) var(--ease-standard);
  }

  .card:hover {
    background: var(--paper-3);
  }

  .card::before {
    content: "";
    display: block;
    width: 32px;
    height: 3px;
    background: var(--bn-orange);
    border-radius: 2px;
    margin-bottom: 20px;
  }

  .card-num {
    font-family: var(--font-en);
    font-size: 48px;
    font-weight: 700;
    color: var(--bn-orange);
    line-height: 1;
    letter-spacing: -0.02em;
    margin-bottom: 6px;
    font-feature-settings: "tnum" 1;
  }

  .card-unit {
    font-family: var(--font-tc);
    font-size: 15px;
    font-weight: 500;
    color: var(--bn-black);
    margin-bottom: 12px;
  }

  .card-desc {
    font-family: var(--font-tc);
    font-size: 14px;
    font-weight: 400;
    color: var(--cool-600);
    line-height: 1.6;
  }

  /* ── Footer band ── */
  .widget-footer {
    background: var(--bn-navy);
    border-radius: 0 0 var(--r-feature) var(--r-feature);
    margin-top: 28px;
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .footer-source {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(201,205,213,0.7);
  }

  .footer-date {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.06em;
    color: rgba(201,205,213,0.5);
    white-space: nowrap;
  }

  /* ── Mobile ── */
  @media (max-width: 640px) {
    .widget {
      padding: 28px 16px 0;
    }

    .widget-title {
      font-size: 18px;
    }

    .cards {
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .card {
      padding: 22px 20px 18px;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .card::before {
      display: none;
    }

    .card-left {
      flex: 0 0 auto;
    }

    .card-right {
      flex: 1;
    }

    .card-num {
      font-size: 40px;
      margin-bottom: 2px;
    }

    .card-unit {
      font-size: 13px;
      margin-bottom: 0;
    }

    .card-desc {
      font-size: 13px;
    }

    .widget-footer {
      border-radius: 0 0 16px 16px;
      padding: 14px 16px;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
      margin-top: 20px;
    }
  }

  /* 數字計數動畫 */
  .card-num {
    transition: opacity 0.3s;
  }
</style>
</head>
<body>

<div class="widget">
  <header class="widget-header">
    <div class="widget-kicker">META · 2026-05-20</div>
    <h2 class="widget-title">這週 Meta 到底動了多少人？<span>三個數字看清楚</span></h2>
  </header>

  <div class="cards">
    <!-- Card 1 -->
    <div class="card">
      <div class="card-left">
        <div class="card-num" data-target="8000">0</div>
        <div class="card-unit">人 遭裁員</div>
      </div>
      <div class="card-right">
        <div class="card-desc">佔全球員工總數約 10%，集中在非 AI 核心業務部門</div>
      </div>
    </div>

    <!-- Card 2 -->
    <div class="card">
      <div class="card-left">
        <div class="card-num" data-target="7000">0</div>
        <div class="card-unit">人 被轉調</div>
      </div>
      <div class="card-right">
        <div class="card-desc">轉往 AI 工作流相關新部門，非離職但角色大幅轉變</div>
      </div>
    </div>

    <!-- Card 3 -->
    <div class="card">
      <div class="card-left">
        <div class="card-num" data-target="20">0</div>
        <div class="card-unit">% 員工受影響</div>
      </div>
      <div class="card-right">
        <div class="card-desc">裁員 + 轉調合計，是 Meta 史上單週最大規模人力異動</div>
      </div>
    </div>
  </div>

  <footer class="widget-footer">
    <span class="footer-source">Source：Reuters · 路透社</span>
    <span class="footer-date">2026-05-20</span>
  </footer>
</div>

<script>
  // 數字計數動畫
  function countUp(el) {
    const target = parseInt(el.dataset.target, 10);
    const duration = 900;
    const start = performance.now();
    function update(now) {
      const elapsed = now - start;
      const progress = Math.min(elapsed / duration, 1);
      // ease-out cubic
      const ease = 1 - Math.pow(1 - progress, 3);
      const current = Math.round(target * ease);
      el.textContent = current.toLocaleString('en-US');
      if (progress < 1) requestAnimationFrame(update);
      else el.textContent = target.toLocaleString('en-US');
    }
    requestAnimationFrame(update);
  }

  // IntersectionObserver 觸發
  const nums = document.querySelectorAll('.card-num[data-target]');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        countUp(entry.target);
        observer.unobserve(entry.target);
      }
    });
  }, { threshold: 0.4 });

  nums.forEach(n => observer.observe(n));

  // postMessage auto-height（後台 iframe 自動適高用）
  function sendHeight() {
    const h = document.documentElement.scrollHeight;
    window.parent.postMessage({ type: 'bn-iframe-height', height: h }, '*');
  }
  window.addEventListener('load', sendHeight);
  window.addEventListener('resize', sendHeight);
</script>

</body>
</html>
